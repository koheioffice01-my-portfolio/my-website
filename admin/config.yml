backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "assets" # Media files will be stored in the repo under assets/
public_folder: "/assets" # The src attribute for uploaded media will begin with /assets/

collections:
  - name: "blog" # Used in routes, e.g., /admin/collections/blog
    label: "ブログ記事" # Used in the UI
    folder: "src/blog" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - {label: "レイアウト", name: "layout", widget: "hidden", default: "layouts/article.njk"}
      - {label: "タイトル", name: "title", widget: "string"}
      - {label: "公開日", name: "date", widget: "datetime"}
      - {label: "カテゴリー", name: "category", widget: "select", options: ["マイホームの購入", "不動産の売却", "収益物件の購入"]}
      - {label: "サムネイル画像", name: "image", widget: "image", required: false}
      - {label: "本文", name: "body", widget: "markdown"}
